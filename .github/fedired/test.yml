name: CI for Fedired

on:
  push:
    branches:
      - main  # Cambia 'main' por la rama principal de tu repositorio si es diferente
      - develop
    paths:
      - packages/backend/**
      - packages/backend-rs/**
      - packages/client/**
      - packages/sw/**
      - packages/fedired-js/**
      - packages/shared/eslint.config.js
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - packages/backend/**
      - packages/backend-rs/**
      - packages/client/**
      - packages/sw/**
      - packages/fedired-js/**
      - packages/shared/eslint.config.js
      - .github/workflows/ci.yml

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      
      - name: Enable corepack
        run: corepack enable
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    needs: [install]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        workspace:
          - backend
          - backend-rs
          - client
          - sw
          - fedired-js
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/eslint-${{ matrix.workspace }}
          key: eslint-${{ github.sha }}-${{ matrix.workspace }}
          restore-keys: eslint-${{ matrix.workspace }}-

      - name: Run ESLint
        run: pnpm --filter ${{ matrix.workspace }} run lint --cache --cache-location node_modules/.cache/eslint-${{ matrix.workspace }}

  typecheck:
    needs: [install]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        workspace:
          - backend
          - backend-rs
          - fedired-js
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run TypeScript type check
        run: pnpm --filter ${{ matrix.workspace }} run typecheck
